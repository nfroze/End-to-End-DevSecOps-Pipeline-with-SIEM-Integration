name: Infrastructure Security

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '**/*.tf'
      - '.github/workflows/iac.yml'
  pull_request:
    branches: [main]
    paths:
      - '**/*.tf'
      - '.github/workflows/iac.yml'

jobs:
  terraform-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: IaC Security Scan (Checkov)
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: terraform
          framework: terraform
          output_format: cli
          soft_fail: true

      - name: Security Summary
        if: always()
        run: |
          echo "### Infrastructure Security Scan Complete"
          echo "Checkov validates our Terraform against:"
          echo "- AWS Security Best Practices"
          echo "- CIS Benchmarks"
          echo "- Infrastructure Hardening"
          echo ""
          echo "See SECURITY_EXCEPTIONS.md for accepted risks in this demo environment."